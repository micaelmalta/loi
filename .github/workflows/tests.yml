name: Tests

on:
  push:
    branches: [main]
    paths:
      - "skills/loi/scripts/**"
      - "skills/loi/tests/**"
  pull_request:
    paths:
      - "skills/loi/scripts/**"
      - "skills/loi/tests/**"

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest skills/loi/tests/ -v --tb=short

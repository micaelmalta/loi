name: LOI Committee Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      provider:
        description: "AI provider"
        required: false
        default: "gemini"
        type: choice
        options:
          - gemini
          - anthropic
          - openai

# Cancel in-progress runs for the same PR
concurrency:
  group: loi-committee-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Priority: workflow_dispatch input → repo variable → default (gemini)
  LOI_AI_PROVIDER: ${{ inputs.provider || vars.LOI_AI_PROVIDER || 'gemini' }}
  LOI_FAIL_ON_CRITICAL: ${{ vars.LOI_FAIL_ON_CRITICAL || 'true' }}

jobs:
  committee-review:
    name: "LOI Committee — ${{ matrix.persona }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        persona: [architect, security]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -200)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          SOURCE_COUNT=$(echo "$FILES" | grep -cE '\.(go|ts|tsx|js|jsx|py|rb|rs|java|kt|swift)$' || echo "0")
          echo "source_count=$SOURCE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Skip if no source changes
        if: steps.changed.outputs.source_count == '0'
        run: echo "No source files changed — skipping committee review."

      - name: Load LOI index context
        if: steps.changed.outputs.source_count != '0'
        run: |
          if [ -f "docs/index/_root.md" ]; then
            head -100 docs/index/_root.md > /tmp/loi_context.txt
          else
            echo "(no LOI index found)" > /tmp/loi_context.txt
          fi

      # -----------------------------------------------------------------------
      # Build prompt (shared across all providers)
      # -----------------------------------------------------------------------
      - name: Build review prompt
        if: steps.changed.outputs.source_count != '0'
        id: prompt
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          PERSONA: ${{ matrix.persona }}
        with:
          script: |
            const fs = require('fs');
            const persona = process.env.PERSONA;
            const files = (process.env.CHANGED_FILES || '').trim();
            const loiContext = fs.readFileSync('/tmp/loi_context.txt', 'utf8');

            let fileContents = '';
            const fileList = files.split('\n').filter(f => f.trim());
            for (const file of fileList.slice(0, 20)) {
              try {
                fileContents += `\n--- ${file} ---\n${fs.readFileSync(file, 'utf8').slice(0, 4000)}\n`;
              } catch (_) {}
            }

            const sharedFooter = [
              'LOI Index Context:\n' + loiContext,
              'Changed files:\n' + (fileContents || files),
            ].join('\n\n');

            const prompts = {
              architect: [
                'You are the Architect persona of the LOI RLM Committee. Be concise.',
                'Review for: mixed concerns, tight coupling, missing abstractions, files that should be split.',
                'Rate each flagged file: architectural_health = "healthy" | "warning" | "critical".',
                sharedFooter,
                'For each issue output a JSON block:\n```json\n{"file":"<path>","architectural_health":"<rating>","committee_notes":"<one sentence>"}\n```',
                'If no issues, say so briefly.',
              ].join('\n\n'),
              security: [
                'You are the Security persona of the LOI RLM Committee. Be concise.',
                'Review for: raw SQL, PII without encryption, secrets in code, missing input validation.',
                'Rate each flagged file: security_tier = "standard" | "high" | "sensitive".',
                sharedFooter,
                'For each issue output a JSON block:\n```json\n{"file":"<path>","security_tier":"<rating>","committee_notes":"<one sentence>"}\n```',
                'If no issues, say so briefly.',
              ].join('\n\n'),
            };

            core.setOutput('text', prompts[persona]);
            core.setOutput('files_count', String(fileList.length));

      # -----------------------------------------------------------------------
      # Provider: Gemini
      # Official action: google-github-actions/run-gemini-cli
      # Requires secret: GEMINI_API_KEY
      # -----------------------------------------------------------------------
      - name: Run Gemini review
        if: steps.changed.outputs.source_count != '0' && env.LOI_AI_PROVIDER == 'gemini'
        id: gemini
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ vars.LOI_AI_MODEL || 'gemini-2.0-flash' }}
          prompt: ${{ steps.prompt.outputs.text }}
        # Output available at: steps.gemini.outputs.summary

      # -----------------------------------------------------------------------
      # Provider: Anthropic
      # No official action suited for batch review; direct API used.
      # (anthropics/claude-code-action is for interactive PR assistance)
      # Requires secret: ANTHROPIC_API_KEY
      #
      # Provider: OpenAI
      # No official GitHub Action exists; direct API used.
      # Requires secret: OPENAI_API_KEY
      # -----------------------------------------------------------------------
      - name: Run API review (anthropic / openai)
        if: >-
          steps.changed.outputs.source_count != '0' &&
          (env.LOI_AI_PROVIDER == 'anthropic' || env.LOI_AI_PROVIDER == 'openai')
        id: api_review
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOI_AI_MODEL: ${{ vars.LOI_AI_MODEL }}
        with:
          script: |
            const provider = process.env.LOI_AI_PROVIDER;
            const prompt = `${{ steps.prompt.outputs.text }}`;

            async function callAI(provider, prompt) {
              if (provider === 'anthropic') {
                const key = process.env.ANTHROPIC_API_KEY;
                if (!key) throw new Error('ANTHROPIC_API_KEY secret not set');
                const resp = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json' },
                  body: JSON.stringify({
                    model: process.env.LOI_AI_MODEL || 'claude-sonnet-4-6',
                    max_tokens: 1024,
                    messages: [{ role: 'user', content: prompt }],
                  }),
                });
                if (!resp.ok) throw new Error(`Anthropic ${resp.status}: ${await resp.text()}`);
                return (await resp.json()).content?.[0]?.text || '';
              }
              if (provider === 'openai') {
                const key = process.env.OPENAI_API_KEY;
                if (!key) throw new Error('OPENAI_API_KEY secret not set');
                const resp = await fetch('https://api.openai.com/v1/chat/completions', {
                  method: 'POST',
                  headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    model: process.env.LOI_AI_MODEL || 'gpt-4o',
                    max_tokens: 1024,
                    messages: [{ role: 'user', content: prompt }],
                  }),
                });
                if (!resp.ok) throw new Error(`OpenAI ${resp.status}: ${await resp.text()}`);
                return (await resp.json()).choices?.[0]?.message?.content || '';
              }
            }

            let review;
            try { review = await callAI(provider, prompt); }
            catch (err) { review = `⚠️ Review unavailable: ${err.message}`; }
            core.setOutput('review', review);

      # -----------------------------------------------------------------------
      # Collect output from whichever provider ran
      # Uses github-script to safely handle multiline/special-char output
      # without shell injection from template expansion.
      # -----------------------------------------------------------------------
      - name: Collect review output
        if: steps.changed.outputs.source_count != '0'
        id: review
        uses: actions/github-script@v7
        env:
          GEMINI_SUMMARY: ${{ steps.gemini.outputs.summary }}
          API_REVIEW: ${{ steps.api_review.outputs.review }}
        with:
          script: |
            const provider = process.env.LOI_AI_PROVIDER;
            const text = provider === 'gemini'
              ? (process.env.GEMINI_SUMMARY || '⚠️ No output — check GEMINI_API_KEY secret.')
              : (process.env.API_REVIEW || '⚠️ No output — check API key secret.');

            const hasCritical =
              text.includes('"architectural_health": "critical"') ||
              text.includes('"security_tier": "sensitive"') ||
              text.includes('"security_tier": "high"');

            core.setOutput('text', text);
            core.setOutput('has_critical', hasCritical ? 'true' : 'false');

      - name: Post review comment
        if: steps.changed.outputs.source_count != '0'
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.review.outputs.text }}
          HAS_CRITICAL: ${{ steps.review.outputs.has_critical }}
          FILES_COUNT: ${{ steps.prompt.outputs.files_count }}
        with:
          script: |
            const persona = '${{ matrix.persona }}';
            const icon = persona === 'architect' ? '🏗️' : '🛡️';
            const review = process.env.REVIEW || '(no output)';
            const hasCritical = process.env.HAS_CRITICAL === 'true';
            const provider = process.env.LOI_AI_PROVIDER;
            const filesCount = process.env.FILES_COUNT || '0';
            const badge = hasCritical ? ' 🚨 **CRITICAL FLAGS**' : '';

            const body = [
              `## ${icon} LOI Committee — ${persona.charAt(0).toUpperCase() + persona.slice(1)} Review${badge}`,
              `**Provider:** \`${provider}\` | **Files reviewed:** ${filesCount}`,
              '',
              review,
              '---',
              '*[LOI Committee CI](.github/workflows/loi-committee.yml)*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `LOI Committee — ${persona.charAt(0).toUpperCase() + persona.slice(1)} Review`;
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  committee-gate:
    name: LOI Committee Gate
    needs: committee-review
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check result
        run: |
          if [ "${{ needs.committee-review.result }}" = "failure" ]; then
            echo "One or more committee personas failed."
            exit 1
          fi
          echo "Committee review complete. Check PR comments for findings."
